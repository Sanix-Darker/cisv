name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.9)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write  # Required for PyPI trusted publishing

jobs:
  release-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Print GitHub event context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "ref_name=${{ github.ref_name }}"
          echo "ref_type=${{ github.ref_type }}"
          echo "sha=${{ github.sha }}"
          echo "actor=${{ github.actor }}"
          echo "workflow=${{ github.workflow }}"
          echo "run_id=${{ github.run_id }}"
          echo "repository=${{ github.repository }}"
          echo "event_inputs_tag=${{ github.event.inputs.tag || '' }}"

      - name: Checkout for tag diagnostics
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Print tag/commit diagnostics
        run: |
          git show -s --oneline --decorate HEAD
          git tag --points-at HEAD || true

  create-release:
    needs: release-diagnostics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true

  # Build Python wheels for multiple platforms
  build-python-wheels:
    needs: release-diagnostics
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Get version from tag
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.tag }}" | sed 's/^v//' >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Update version in pyproject.toml
        shell: bash
        run: |
          cd bindings/python-nanobind
          sed -i.bak "s/version = \".*\"/version = \"${{ steps.get_version.outputs.VERSION }}\"/" pyproject.toml
          rm -f pyproject.toml.bak

      - name: Copy core sources into package
        run: |
          mkdir -p bindings/python-nanobind/core
          cp -r core/src bindings/python-nanobind/core/
          cp -r core/include bindings/python-nanobind/core/

      - name: Build wheels
        run: |
          cd bindings/python-nanobind
          python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_* *-win32 *-manylinux_i686"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          # Only x86_64 on Linux (aarch64 via QEMU is too slow)
          CIBW_ARCHS_LINUX: "x86_64"
          # Align with cibuildwheel's minimum supported deployment target on macOS runners.
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=11.0"

      - name: Validate wheel archives
        run: |
          ls -1 bindings/python-nanobind/wheelhouse/*.whl >/dev/null
          count=0
          for wheel in bindings/python-nanobind/wheelhouse/*.whl; do
            python -m zipfile -t "$wheel"
            count=$((count + 1))
          done
          echo "Validated ${count} wheel(s)"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: bindings/python-nanobind/wheelhouse/*.whl

  # Build source distribution
  build-python-sdist:
    needs: release-diagnostics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Get version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.tag }}" | sed 's/^v//' >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Update version in pyproject.toml
        run: |
          cd bindings/python-nanobind
          sed -i "s/version = \".*\"/version = \"${{ steps.get_version.outputs.VERSION }}\"/" pyproject.toml

      - name: Copy core sources for sdist
        run: |
          mkdir -p bindings/python-nanobind/core
          cp -r core/src bindings/python-nanobind/core/
          cp -r core/include bindings/python-nanobind/core/

      - name: Build sdist
        run: |
          cd bindings/python-nanobind
          pip install build
          python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: bindings/python-nanobind/dist/*.tar.gz

  # Publish to PyPI
  publish-pypi:
    runs-on: ubuntu-latest
    needs: [build-python-wheels, build-python-sdist]
    environment:
      name: pypi
      url: https://pypi.org/project/cisv/
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v7
        with:
          pattern: wheels-*
          path: dist/wheels
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v7
        with:
          name: sdist
          path: dist/sdist

      - name: Prepare publish directory
        run: |
          mkdir -p dist/publish
          cp -v dist/wheels/*.whl dist/publish/
          cp -v dist/sdist/*.tar.gz dist/publish/

      - name: Validate distribution archives
        run: |
          ls -1 dist/publish/* >/dev/null
          count=0
          for path in dist/publish/*; do
            case "$path" in
              *.whl)
                python -m zipfile -t "$path"
                ;;
              *.tar.gz)
                tar -tzf "$path" >/dev/null
                ;;
              *)
                echo "Unexpected distribution file: $path"
                exit 1
                ;;
            esac
            count=$((count + 1))
          done
          echo "Validated ${count} distribution file(s)"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/publish
          attestations: false
          password: ${{ secrets.PYPI_API_TOKEN }}

  # Publish to npm
  publish-npm:
    runs-on: ubuntu-latest
    needs: [release-diagnostics, create-release]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Get version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.tag }}" | sed 's/^v//' >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Prepare npm package
        run: |
          cd bindings/nodejs
          npm version ${{ steps.get_version.outputs.VERSION }} --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: |
          cd bindings/nodejs
          npm install --install-links

      - name: Build native addon
        run: |
          cd bindings/nodejs
          npm run build

      - name: Publish to npm
        run: |
          cd bindings/nodejs
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
