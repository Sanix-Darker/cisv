name: CI

# SECURITY NOTE: For production deployments, consider pinning actions to full SHA hashes.
# See .github/SECURITY.md for details on SHA pinning best practices.

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  NODE_VERSION: '23.x'
  CACHE_KEY_PREFIX: 'cisv-v2'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-keys.outputs.node }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'bindings/nodejs/package-lock.json'

      - name: Generate cache keys
        id: cache-keys
        run: echo "node=${{ env.CACHE_KEY_PREFIX }}-node-${{ hashFiles('bindings/nodejs/package-lock.json') }}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          cd bindings/nodejs
          npm ci

      - name: Cache node_modules
        uses: actions/cache/save@v5
        with:
          path: bindings/nodejs/node_modules
          key: ${{ steps.cache-keys.outputs.node }}

  npm-tests:
    name: Node.js Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore dependencies
        uses: actions/cache/restore@v5
        with:
          path: bindings/nodejs/node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Build and test
        run: |
          cd bindings/nodejs
          npm run test:build

  c-tests:
    name: C Core Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache build tools
        uses: actions/cache@v5
        with:
          path: |
            /var/cache/apt
            /usr/include
          key: ${{ env.CACHE_KEY_PREFIX }}-build-tools-${{ runner.os }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake valgrind

      - name: Build and run core tests
        run: |
          make core
          cd core
          make test

  cli-build-test:
    name: CLI Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache build artifacts
        uses: actions/cache@v5
        with:
          path: |
            core/build/
            cli/build/
          key: ${{ env.CACHE_KEY_PREFIX }}-cli-${{ matrix.os }}-${{ hashFiles('core/**', 'cli/**', 'Makefile') }}

      - name: Build CLI
        run: |
          make clean
          make all

      - name: Test CLI functionality
        run: |
          cat > test.csv << 'EOF'
          id,name,value
          1,test,100
          2,demo,200
          EOF
          LD_LIBRARY_PATH=core/build cli/build/cisv --version
          LD_LIBRARY_PATH=core/build cli/build/cisv --help
          test "$(LD_LIBRARY_PATH=core/build cli/build/cisv -c test.csv | tr -d '[:space:]')" = "3"
          LD_LIBRARY_PATH=core/build cli/build/cisv test.csv
          LD_LIBRARY_PATH=core/build cli/build/cisv -s 0,2 test.csv
          LD_LIBRARY_PATH=core/build cli/build/cisv --head 1 test.csv
          rm -f test.csv

      - name: Upload CLI binary
        uses: actions/upload-artifact@v6
        with:
          name: cisv-cli-${{ matrix.os }}
          path: cli/build/cisv
          retention-days: 7

  memory-check:
    name: Memory Safety Tests
    runs-on: ubuntu-latest
    needs: cli-build-test
    # for now, allow always runs regarding memory Safety
    # if: |
    #   github.event_name == 'pull_request' &&
    #   contains(github.event.pull_request.labels.*.name, 'memory-checks')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install memory checking tools
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind cppcheck clang-tools

      - name: Build with debug symbols
        run: |
          make clean
          CFLAGS="-g -O0 -fPIC -D_GNU_SOURCE" make all

      - name: Create test data
        run: |
          cat > memtest.csv << 'EOF'
          id,name,value
          1,test,100
          2,demo,200
          EOF

      - name: Run Valgrind tests
        run: |
          export LD_LIBRARY_PATH=core/build
          valgrind --leak-check=full --show-leak-kinds=all --track-origins=yes \
            --verbose --log-file=valgrind-version.log cli/build/cisv --version
          valgrind --leak-check=full --show-leak-kinds=all --track-origins=yes \
            --log-file=valgrind-basic.log cli/build/cisv memtest.csv
          valgrind --leak-check=full --show-leak-kinds=all --track-origins=yes \
            --log-file=valgrind-count.log cli/build/cisv -c memtest.csv
          valgrind --leak-check=full --show-leak-kinds=all --track-origins=yes \
            --log-file=valgrind-select.log cli/build/cisv -s 0,2 memtest.csv

      - name: Check for memory leaks
        run: |
          ! grep -q "definitely lost" valgrind-*.log
          ! grep -q "indirectly lost" valgrind-*.log

      - name: Run deep leak tests
        run: |
          if [ -f scripts/test_select.sh ]; then chmod +x scripts/test_select.sh && bash ./scripts/test_select.sh; fi
          if [ -f scripts/test_transform.sh ]; then chmod +x scripts/test_transform.sh && bash ./scripts/test_transform.sh; fi

      - name: Upload memory check logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: memory-check-logs
          path: valgrind-*.log
          retention-days: 30


  php-bindings:
    name: PHP Binding API Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install PHP build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli php-dev php-pear build-essential

      - name: Build and install cisv extension
        run: |
          cd bindings/php/src
          phpize
          ./configure
          make -j"$(nproc)"
          sudo make install

      - name: Verify exported PHP API
        run: |
          php -d extension=cisv.so bindings/php/scripts/verify_api.php
          php -d extension=cisv.so -r 'echo "CisvParser methods: ".implode(",", get_class_methods("CisvParser")).PHP_EOL;'
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [npm-tests, c-tests, cli-build-test, php-bindings]
    if: always()
    steps:
      - name: Check job results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"
            exit 1
          elif [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs were cancelled"
            exit 1
          else
            echo "All CI jobs succeeded"
          fi
